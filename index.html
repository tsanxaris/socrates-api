<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Socrates AI</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

  <h1>Socrates AI</h1>

  <!-- 👉 ΕΔΩ ΘΑ ΦΑΙΝΕΤΑΙ Η ΕΡΩΤΗΣΗ -->
  <div id="q" style="border:2px solid white;padding:20px;width:60%;margin:20px auto;">
    Press New Question
  </div>

  <input id="a" placeholder="Your answer">
  <br><br>

  <button onclick="getQ()">New Question</button>
  <button onclick="sendA()">Answer</button>

  <script>
    let currentQ = "";

    async function getQ() {
      document.getElementById("q").innerText = "Σκέφτομαι...";

      try {
        const res = await fetch("https://socrates-api-fg0h.onrender.com/ai", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({})
        });

        const data = await res.json();

        currentQ = data.text;
        document.getElementById("q").innerText = data.text;

      } catch {
        document.getElementById("q").innerText = "Error loading question";
      }
    }

    async function sendA() {
      const ans = document.getElementById("a").value;

      const res = await fetch("https://socrates-api-fg0h.onrender.com/ai", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question: currentQ,
          answer: ans
        })
      });

      const data = await res.json();

      document.getElementById("q").innerText = data.text;
    }
  </script>

</body>
</html>
