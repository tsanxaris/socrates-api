<!DOCTYPE html>
<html>
<head>
  <title>Socrates AI</title>
</head>

<body style="background:black; color:white; text-align:center; font-family:sans-serif;">

<h1>Socrates AI</h1>

<div id="q" style="border:1px solid white; padding:20px; margin:20px;">
Press New Question
</div>

<input id="answer" placeholder="A, B, C or D" style="padding:10px;">
<br><br>

<button onclick="getQ()" style="padding:10px;">New Question</button>
<button onclick="check()" style="padding:10px;">Answer</button>

<script>
let correctAnswer = null;
let level = 1;
let total = 0;
let correctCount = 0;

// 🎯 πάρε ερώτηση
async function getQ() {
  document.getElementById("q").innerText = "Σκέφτομαι...";

  const res = await fetch("https://socrates-api-fg0h.onrender.com/ai", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ mode: "question" })
  });

  const data = await res.json();

  correctAnswer = data.correct;

  document.getElementById("q").innerText =
    `LEVEL ${level}\n\n` + data.text;
}

// 🎯 έλεγχος
function check() {
  const userAnswer = document.getElementById("answer").value.toUpperCase();

  if (!userAnswer) return;

  total++;

  if (userAnswer === correctAnswer) {
    correctCount++;
    document.getElementById("q").innerText = "Correct ✅";
  } else {
    document.getElementById("q").innerText = "Wrong ❌";
  }

  // 🔼 LEVEL UP ΜΟΝΟ ΑΝ 2 ΣΩΣΤΑ
  if (correctCount === 2 && level === 1) {
    level = 2;
    correctCount = 0;

    setTimeout(() => {
      alert("🔼 Level 2!");
      getQ();
    }, 1000);
    return;
  }

  if (correctCount === 2 && level === 2) {
    level = 3;
    correctCount = 0;

    setTimeout(() => {
      alert("🔼 Level 3!");
      getQ();
    }, 1000);
    return;
  }

  // 🎉 ΤΕΛΟΣ
  if (total === 6) {
    setTimeout(() => {
      document.getElementById("q").innerText =
        "🎉 FINISHED!\nKEY: ARETE\nΧρησιμοποίησε το στο Quizizz!";
    }, 1000);
    return;
  }

  setTimeout(getQ, 1000);
}
</script>

</body>
</html>
