<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

<h1>Socrates</h1>

<p id="q">Press button</p>

<input id="a" placeholder="Your answer">
<br><br>

<button onclick="getQ()">New Question</button>
<button onclick="sendA()">Answer</button>

<script>
let currentQ = "";

async function getQ() {
  const res = await fetch("https://socrates-api-fg0h.onrender.com/ai", {
    method: "POST"
  });

  const data = await res.json();

  // Παίρνουμε ΜΟΝΟ το καθαρό κείμενο
  const text = data.data;

  currentQ = text;
  document.getElementById("q").innerText = text;
}

async function sendA() {
  const ans = document.getElementById("a").value;

  const res = await fetch("https://socrates-api-fg0h.onrender.com/ai", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      question: currentQ,
      answer: ans
    })
  });

  const data = await res.json();

  const text = data.data;

  document.getElementById("q").innerText = text;
}
</script>

</body>
</html>
