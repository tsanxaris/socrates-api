<script>
let correctAnswer = null;

let total = 0;
let level = 1;

// 🎯 πάρε ερώτηση
async function getQ() {
  document.getElementById("q").innerText = "Σκέφτομαι...";

  const res = await fetch("https://socrates-api-fg0h.onrender.com/ai", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ mode: "question" })
  });

  const data = await res.json();

  correctAnswer = data.correct;

  document.getElementById("q").innerText =
    `LEVEL ${level}\n\n` + data.text;
}

// 🎯 έλεγχος
async function check() {
  const userAnswer = document.getElementById("answer").value.toUpperCase();

  if (!userAnswer) return;

  total++;

  if (userAnswer === correctAnswer) {
    document.getElementById("q").innerText = "Correct ✅";
  } else {
    document.getElementById("q").innerText = "Wrong ❌";
  }

  // 🔼 κάθε 2 ερωτήσεις → level up
  if (total === 2) {
    level = 2;
    setTimeout(() => {
      alert("🔼 Level 2!");
      getQ();
    }, 1000);
    return;
  }

  if (total === 4) {
    level = 3;
    setTimeout(() => {
      alert("🔼 Level 3!");
      getQ();
    }, 1000);
    return;
  }

  // 🎉 ΤΕΛΟΣ (6 ερωτήσεις)
  if (total === 6) {
    setTimeout(() => {
      document.getElementById("q").innerText =
        "🎉 FINISHED!\n\nKEY: ARETE\nΧρησιμοποίησε το στο επόμενο παιχνίδι!";
    }, 1000);
    return;
  }

  // επόμενη ερώτηση
  setTimeout(getQ, 1000);
}
</script>
