<!DOCTYPE html>
<html>
<head>
  <title>Socrates AI</title>
</head>

<body style="background:black; color:white; text-align:center; font-family:sans-serif;">

<h1>Socrates AI</h1>

<div id="q">Press New Question</div>

<button onclick="getQ()">New Question</button>

<script>
let correctAnswer = null;

async function getQ() {
  try {
    document.getElementById("q").innerText = "Σκέφτομαι...";

    const res = await fetch("https://socrates-api-fg0h.onrender.com/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ mode: "question" })
    });

    const data = await res.json();

    console.log("API:", data);

    correctAnswer = data.correct;

    document.getElementById("q").innerText = data.text;

  } catch (err) {
    console.log("ERROR:", err);
    document.getElementById("q").innerText = "API ERROR";
  }
}
</script>

</body>
</html>
