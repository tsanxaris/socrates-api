<!DOCTYPE html>
<html>
<head>
  <title>Socrates AI</title>
</head>

<body style="background:black; color:white; text-align:center; font-family:sans-serif;">

<h1>Socrates AI</h1>

<div id="q" style="border:1px solid white; padding:20px; margin:20px;">
Press New Question
</div>

<input id="answer" placeholder="A, B, C or D">
<br><br>

<button onclick="getQ()">New Question</button>
<button onclick="check()">Answer</button>

<script>
let correctAnswer = null;
let total = 0;
let level = 1;

// 🎯 πάρε ερώτηση
async function getQ() {
  try {
    document.getElementById("q").innerText = "Σκέφτομαι...";

    const res = await fetch("https://socrates-api-fg0h.onrender.com/ai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mode: "question" })
    });

    const data = await res.json();

    correctAnswer = data.correct;

    document.getElementById("q").innerText =
      `LEVEL ${level}\n\n` + data.text;

  } catch (err) {
    document.getElementById("q").innerText = "API ERROR";
  }
}

// 🎯 έλεγχος
function check() {
  const userAnswer = document.getElementById("answer").value.toUpperCase();

  if (!userAnswer) return;

  total++;

  if (userAnswer === correctAnswer) {
    document.getElementById("q").innerText = "Correct ✅";
  } else {
    document.getElementById("q").innerText = "Wrong ❌";
  }

  // 🔼 level up κάθε 2
  if (total === 2) {
    level = 2;
    setTimeout(() => {
      alert("🔼 Level 2!");
      getQ();
    }, 1000);
    return;
  }

  if (total === 4) {
    level = 3;
    setTimeout(() => {
      alert("🔼 Level 3!");
      getQ();
    }, 1000);
    return;
  }

  // 🎉 τέλος
  if (total === 6) {
    setTimeout(() => {
      document.getElementById("q").innerText =
        "🎉 FINISHED!\nKEY: ARETE\nΧρησιμοποίησε το στο Quizizz!";
    }, 1000);
    return;
  }

  setTimeout(getQ, 1000);
}
</script>

</body>
</html>
